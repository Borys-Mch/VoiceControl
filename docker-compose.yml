services:
  whisper:
    image: ghcr.io/ggml-org/whisper.cpp:main
    container_name: whisper
    entrypoint: ["whisper-server"]
    command:
      - --model
      - /models/ggml-small.bin
      - --host
      - 0.0.0.0
      - --port
      - "10300"
      - --language
      - uk
    volumes:
      - ./models:/models
    restart: unless-stopped
    ports:
      - "10300:10300"

  piper:
    image: python:3.11-slim
    container_name: piper
    working_dir: /app
    command: sh -c "pip install --no-cache-dir 'piper-tts[http]' && python -m piper.http_server --host 0.0.0.0 --port 5000 --model /models/uk_UA-ukrainian_tts-medium.onnx"
    volumes:
      - ./models:/models
    restart: unless-stopped
    ports:
      - "5000:5000"

  assistant:
    image: python:3.11-slim
    container_name: voice-assistant
    volumes:
      - ./app:/app
      - ./requirements.txt:/app/requirements.txt:ro
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 5000"
    restart: unless-stopped
    ports:
      - "5001:5000"

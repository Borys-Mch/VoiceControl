services:
  whisper:
    image: ghcr.io/ggml-org/whisper.cpp:main
    container_name: whisper
    command: >
      whisper-server
      -m /models/ggml-small.bin
      --host 0.0.0.0
      --port 10300
      --language uk
    volumes:
      - ./models:/models
    restart: unless-stopped
    ports:
      - "10300:10300"

  piper:
    image: rhasspy/piper:latest
    container_name: piper
    command: >
      --http-port 10200
      --model /voices/uk_UA-ukrainian_tts-medium.onnx
    volumes:
      - ./models:/voices
    restart: unless-stopped
    ports:
      - "10200:10200"

  assistant:
    image: python:3.11-slim
    container_name: voice-assistant
    volumes:
      - ./app:/app
      - ./requirements.txt:/app/requirements.txt:ro
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 5000"
    restart: unless-stopped
    ports:
      - "5000:5000"
